name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('apps/stargazing_spots/pyproject.toml') }}

      - name: Install GDAL system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install pipeline
        run: |
          uv sync
          cd apps/stargazing_spots && uv sync

      - name: Lint with ruff
        run: |
          uv run ruff check apps/stargazing_spots/stargazing_spots/ apps/stargazing_spots/tests/

      - name: Run tests
        run: |
          uv run python -m pytest apps/stargazing_spots/tests/ -v
